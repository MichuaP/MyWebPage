<section id="education">
    <h2 class="text-slate-900 dark:text-slate-100 text-3xl font-bold mb-8 flex items-center gap-3">
        <span class="material-symbols-outlined text-primary">school</span>
        Education & Certifications
    </h2>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        @for (item of educationList; track item.title) {
        <div
            class="flex flex-col gap-4 p-6 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 hover:shadow-xl hover:border-primary/50 transition-all">
            <div class="w-12 h-12 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
                <span class="material-symbols-outlined">{{ item.icon }}</span>
            </div>
            <div>
                <h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold">{{ item.title }}</h3>
                <p class="text-slate-500 dark:text-slate-400 text-sm">{{ item.subtitle }}</p>
            </div>
        </div>
        }
    </div>
</section>
