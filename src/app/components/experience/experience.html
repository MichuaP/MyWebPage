<section id="experience">
    <h2 class="text-slate-900 dark:text-slate-100 text-3xl font-bold mb-10 flex items-center gap-3">
        <span class="material-symbols-outlined text-primary">work</span>
        Experiencie
    </h2>
    <div class="space-y-8 relative before:absolute before:inset-0 before:ml-5 before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-slate-200 dark:before:via-slate-800 before:to-transparent">
        
        @for (job of experienceList; track job.title) {
        <div class="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group">
            
            <div [class]="'flex items-center justify-center w-10 h-10 rounded-full border border-white dark:border-slate-900 shadow shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2 z-10 ' + (job.isCurrent ? 'bg-primary text-white' : 'bg-slate-300 dark:bg-slate-700 text-slate-600 dark:text-slate-300')">
                <span class="material-symbols-outlined text-sm">{{ job.icon }}</span>
            </div>
            
            <div class="w-[calc(100%-4rem)] md:w-[calc(50%-2.5rem)] p-6 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-sm transition-all hover:shadow-md">
                <div class="flex items-center justify-between mb-2">
                    <h3 class="font-bold text-slate-900 dark:text-white">{{ job.title }}</h3>
                    <time [class]="'text-xs font-medium px-2 py-1 rounded ' + (job.isCurrent ? 'text-primary bg-primary/10' : 'text-slate-500 bg-slate-100 dark:bg-slate-800')">
                        {{ job.period }}
                    </time>
                </div>
                <div class="text-slate-500 dark:text-slate-400 text-sm mb-4">{{ job.company }}</div>
                <p class="text-slate-600 dark:text-slate-400 text-sm leading-relaxed">
                    {{ job.description }}
                </p>
            </div>
        </div>
        }

    </div>
</section>
