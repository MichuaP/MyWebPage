<section id="projects">
    <h2 class="text-slate-900 dark:text-slate-100 text-3xl font-bold mb-8 flex items-center gap-3">
        <span class="material-symbols-outlined text-primary">rocket_launch</span>
        Featured Projects
    </h2>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        
        @for (project of projectList; track project.title) {
        <div class="group flex flex-col bg-white dark:bg-slate-900 rounded-xl overflow-hidden border border-slate-200 dark:border-slate-800 hover:border-primary/50 transition-all shadow-sm hover:shadow-md">
            
            <div class="h-48 overflow-hidden bg-slate-100 dark:bg-slate-800">
                <img [alt]="project.imageAlt"
                    class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110"
                    [src]="project.image" />
            </div>
            
            <div class="p-6 flex flex-col flex-grow">
                <h3 class="text-lg font-bold text-slate-900 dark:text-white mb-2">{{ project.title }}</h3>
                <p class="text-slate-600 dark:text-slate-400 text-sm mb-4 flex-grow">{{ project.description }}</p>
                
                <div class="flex flex-wrap gap-2 mb-6">
                    @for (tech of project.technologies; track tech) {
                        <span class="text-[10px] font-bold px-2 py-0.5 rounded bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400">
                            {{ tech }}
                        </span>
                    }
                </div>
                
                <a class="inline-flex items-center text-primary text-sm font-bold group-hover:underline mt-auto w-fit" [routerLink]="['/project', project.id]">
                    Ver Proyecto <span class="material-symbols-outlined text-sm ml-1">arrow_forward</span>
                </a>
            </div>
            
        </div>
        }

    </div>
</section>
